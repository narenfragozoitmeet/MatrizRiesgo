name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '19'

jobs:
  # ====================================
  # SECURITY CHECKS
  # ====================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Bandit (Python Security)
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json || true
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
      
      - name: NPM Audit
        run: |
          cd frontend
          npm audit --audit-level=moderate

  # ====================================
  # LINT & FORMAT
  # ====================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd backend
          pip install black flake8 isort
      
      - name: Black Format Check
        run: |
          cd backend
          black . --check
      
      - name: Flake8 Lint
        run: |
          cd backend
          flake8 . --max-line-length=120 --exclude=__pycache__,venv
      
      - name: isort Check
        run: |
          cd backend
          isort . --check-only
      
      - name: ESLint Frontend
        run: |
          cd frontend
          npm ci
          npm run lint || true

  # ====================================
  # BACKEND TESTS
  # ====================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run tests with coverage
        env:
          MONGO_URL: mongodb://localhost:27017
          EMERGENT_LLM_KEY: test-key-for-ci
        run: |
          cd backend
          pytest tests/ --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  # ====================================
  # FRONTEND TESTS
  # ====================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ====================================
  # BUILD DOCKER IMAGE
  # ====================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [security, lint, test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: your-username/riesgo-ia-backend:latest
          cache-from: type=registry,ref=your-username/riesgo-ia-backend:buildcache
          cache-to: type=registry,ref=your-username/riesgo-ia-backend:buildcache,mode=max
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: your-username/riesgo-ia-frontend:latest

  # ====================================
  # DEPLOY (opcional)
  # ====================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        run: echo "Deploy step - configure según tu infraestructura"
        # Kubernetes, AWS ECS, Railway, Vercel, etc.
